name: PR Unit Tests - Changed Tests Only

on:
  pull_request:
    branches:
      - dev

jobs:
  run-changed-unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            */package-lock.json
      
      - name: Detect changed test files
        id: changed-tests
        run: |
          echo "Detecting changed test files..."
          
          # Get the list of changed files between base and head
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Filter for unit test files in any folder with /webapp/test/unit/ structure
          TEST_FILES=$(echo "$CHANGED_FILES" | grep -E '/webapp/test/unit/.*\.js$' || true)
          
          if [ -z "$TEST_FILES" ]; then
            echo "No unit test files changed. Skipping test execution."
            echo "has_test_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed test files:"
            echo "$TEST_FILES"
            echo "has_test_changes=true" >> $GITHUB_OUTPUT
            
            # Save changed test files as JSON array for the parser script
            echo "$TEST_FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))' > changed-test-files.json
          fi
      
      - name: Parse changed tests
        if: steps.changed-tests.outputs.has_test_changes == 'true'
        env:
          GIT_BASE_REF: ${{ github.event.pull_request.base.sha }}
          GIT_HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          node .github/scripts/parse-changed-tests.js
      
      - name: Run unit tests for all projects with changes
        if: steps.changed-tests.outputs.has_test_changes == 'true'
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: |
          # Check if any projects have test changes
          if [ ! -f "projects-with-changes.txt" ]; then
            echo "No projects with test changes found"
            exit 0
          fi
          
          # Read projects with changes
          PROJECTS=$(cat projects-with-changes.txt)
          
          if [ -z "$PROJECTS" ]; then
            echo "No projects with test changes"
            exit 0
          fi
          
          echo "Projects with test changes:"
          echo "$PROJECTS"
          echo ""
          
          # Initialize summary file
          echo "# Test Execution Summary" > test-summary.md
          echo "" >> test-summary.md
          echo "## 📋 Projects Tested" >> test-summary.md
          echo "" >> test-summary.md
          echo "| Project | Tests | Status | Details |" >> test-summary.md
          echo "|---------|-------|--------|---------|" >> test-summary.md
          
          # Track overall status
          ALL_PASSED=true
          
          # Loop through each project and run tests
          while IFS= read -r project; do
            if [ -z "$project" ]; then
              continue
            fi
            
            echo "========================================"
            echo "Processing: $project"
            echo "========================================"
            
            # Check if project directory exists
            if [ ! -d "$project" ]; then
              echo "⚠ Warning: Project directory $project not found, skipping..."
              echo "| $project | N/A | ⚠️ Skipped | Directory not found |" >> test-summary.md
              continue
            fi
            
            # Check if tests JSON file exists
            TEST_FILE="${project}-tests.json"
            if [ ! -f "$TEST_FILE" ]; then
              echo "⚠ Warning: Test file $TEST_FILE not found, skipping..."
              echo "| $project | N/A | ⚠️ Skipped | Test file not found |" >> test-summary.md
              continue
            fi
            
            # Check if package.json exists
            if [ ! -f "$project/package.json" ]; then
              echo "⚠ Warning: $project/package.json not found, skipping..."
              echo "| $project | N/A | ⚠️ Skipped | package.json not found |" >> test-summary.md
              continue
            fi
            
            # Count tests
            TEST_COUNT=$(cat "$TEST_FILE" | jq 'length')
            
            echo "Installing dependencies for $project..."
            cd "$project"
            npm ci
            
            echo ""
            echo "========================================"
            echo "Tests to execute for $project:"
            echo "========================================"
            cat "../$TEST_FILE" | jq -r '.[] | "  • \(.module): \(.test)"'
            echo "Total: $TEST_COUNT test(s)"
            echo ""
            echo "Running $TEST_COUNT unit test(s) for $project..."
            export PROJECT_CHANGED_TESTS=$(cat "../$TEST_FILE")
            echo "CHANGED_TESTS:"
            echo "$PROJECT_CHANGED_TESTS"
            echo ""
            
            # Run the tests and capture output (tee to show and save)
            echo "========================================"
            echo "Test Output:"
            echo "========================================"
            
            if npm run unit-test-headless 2>&1 | tee "../${project}-test-output.log"; then
              TEST_EXIT_CODE=0
              echo ""
              echo "✓ Tests passed for $project"
              echo "| $project | $TEST_COUNT | ✅ Passed | All tests passed |" >> ../test-summary.md
            else
              TEST_EXIT_CODE=${PIPESTATUS[0]}
              echo ""
              echo "❌ Tests failed for $project (Exit code: $TEST_EXIT_CODE)"
              echo "| $project | $TEST_COUNT | ❌ Failed | Exit code: $TEST_EXIT_CODE |" >> ../test-summary.md
              ALL_PASSED=false
            fi
            
            cd ..
            
            # Add test list to summary
            echo "" >> test-summary.md
            echo "### Tests executed in $project:" >> test-summary.md
            echo "" >> test-summary.md
            cat "$TEST_FILE" | jq -r '.[] | "- **\(.module)**: \(.test)"' >> test-summary.md
            echo "" >> test-summary.md
            
            # Store detailed output with better formatting
            echo "" >> test-summary.md
            echo "<details>" >> test-summary.md
            echo "<summary>📋 View full test output for $project (${TEST_COUNT} test(s))</summary>" >> test-summary.md
            echo "" >> test-summary.md
            echo "\`\`\`" >> test-summary.md
            cat "${project}-test-output.log" >> test-summary.md
            echo "\`\`\`" >> test-summary.md
            echo "</details>" >> test-summary.md
            echo "" >> test-summary.md
            
            # Extract test results summary if available (QUnit output)
            if grep -q "passed\|failed" "${project}-test-output.log" 2>/dev/null; then
              echo "<details>" >> test-summary.md
              echo "<summary>📊 Test Results Summary</summary>" >> test-summary.md
              echo "" >> test-summary.md
              echo "\`\`\`" >> test-summary.md
              grep -E "(passed|failed|total|✓|✗|×)" "${project}-test-output.log" | tail -20 >> test-summary.md
              echo "\`\`\`" >> test-summary.md
              echo "</details>" >> test-summary.md
              echo "" >> test-summary.md
            fi
            
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo ""
              echo "Failed tests in $project, continuing with remaining projects..."
              echo ""
            else
              echo ""
            fi
            
          done < projects-with-changes.txt
          
          # Final summary
          echo "" >> test-summary.md
          echo "---" >> test-summary.md
          
          if [ "$ALL_PASSED" = true ]; then
            echo "## ✅ Result: All Tests Passed" >> test-summary.md
            echo "========================================"
            echo "✓ All project tests completed successfully"
            echo "========================================"
            exit 0
          else
            echo "## ❌ Result: Some Tests Failed" >> test-summary.md
            echo "========================================"
            echo "❌ Some project tests failed"
            echo "========================================"
            exit 1
          fi
      
      - name: Summary
        if: always()
        run: |
          echo "========================================"
          echo "Test Execution Summary"
          echo "========================================"
          echo ""
          
          if [ "${{ steps.changed-tests.outputs.has_test_changes }}" == "false" ]; then
            echo "✓ No unit test files were modified in this PR"
            echo ""
            echo "## ✅ No Test Changes" >> $GITHUB_STEP_SUMMARY
            echo "No unit test files were modified in this PR." >> $GITHUB_STEP_SUMMARY
          else
            if [ -f "test-summary.md" ]; then
              # Display summary in console
              cat test-summary.md
              echo ""
              
              # Add to GitHub Actions summary
              cat test-summary.md >> $GITHUB_STEP_SUMMARY
              
              # Show test details
              if [ -f "projects-with-changes.txt" ]; then
                echo "---"
                echo ""
                echo "### Tests Executed:" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                
                while IFS= read -r project; do
                  if [ -z "$project" ]; then
                    continue
                  fi
                  
                  TEST_FILE="${project}-tests.json"
                  if [ -f "$TEST_FILE" ]; then
                    echo "**$project:**" >> $GITHUB_STEP_SUMMARY
                    echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
                    cat "$TEST_FILE" >> $GITHUB_STEP_SUMMARY
                    echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                  fi
                done < projects-with-changes.txt
              fi
            else
              PROJECT_COUNT=$(cat projects-with-changes.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
              echo "✓ Unit tests completed for $PROJECT_COUNT project(s)"
              echo ""
              echo "## ✅ Tests Completed" >> $GITHUB_STEP_SUMMARY
              echo "Unit tests completed for $PROJECT_COUNT project(s) with modified test files." >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "========================================"
      
      - name: Upload test results
        if: always() && steps.changed-tests.outputs.has_test_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *-tests.json
            *-test-output.log
            test-summary.md
            projects-with-changes.txt
          retention-days: 30
